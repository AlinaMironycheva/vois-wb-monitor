name: WB Monitor

on:
  schedule:
    # Каждый день в 12:00 МСК = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Позволяет запустить вручную из GitHub — кнопка "Run workflow"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код из репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install requests

      - name: Запустить мониторинг
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python wb_monitor.py

      - name: Сохранить обновлённый state.json в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update WB state $(date -u +%Y-%m-%d)"
          git push
